name: cxpan_figures
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - pip
  # Core plotting
  - matplotlib>=3.8
  - seaborn>=0.13
  - numpy>=1.26
  - pandas>=2.1
  - scipy>=1.11
  # UpSet plots
  - upsetplot>=0.9
  # Phylogeny
  - toytree>=3.0           # matplotlib-native tree rendering
  - biopython>=1.83
  - ete3>=3.1
  # CAFE5 plotting (parses output dir directly)
  - pip:
    - cafeplotter>=0.1.0
  # Synteny
  - pygenomeviz>=1.4       # synteny ribbons (alternative to dot plots)
  - mummer4                # optional: nucmer output utilities
  # Tables / export
  - openpyxl>=3.1
